<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GuidedDetours</title>

  <style>
    :root {
      --background: #f8f4ee;
      --blue: #0094bf;
      --blue-dark: #00789c;
      --image-neutral: #ddd0c0;
      --white: #ffffff;
      --black: #000000;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Impact, "Arial Black", Arial, sans-serif;
      background-color: var(--background);
      color: var(--blue);
      line-height: 1.4;
    }

    .page {
      min-height: 100vh;
      padding: 20px 16px 40px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 720px;
      text-align: center;
    }

    header {
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      color: var(--blue);
      font-size: clamp(2.8rem, 13vw, 6rem);
      font-weight: 700;
      letter-spacing: 0.03em;
      line-height: 0.95;
      text-transform: uppercase;
    }

    .flicker-de {
      display: inline-block;
      color: var(--blue);
      animation: brokenNeonFlicker 4.5s infinite;
    }

    @keyframes brokenNeonFlicker {
      0% {
        color: var(--blue);
        opacity: 1;
      }

      8% {
        color: var(--blue);
        opacity: 1;
      }

      10% {
        color: var(--black);
        opacity: 1;
      }

      18% {
        color: var(--black);
        opacity: 1;
      }

      20% {
        color: var(--blue);
        opacity: 1;
      }

      23% {
        color: var(--black);
        opacity: 1;
      }

      30% {
        color: var(--black);
        opacity: 1;
      }

      32% {
        color: var(--blue);
        opacity: 1;
      }

      58% {
        color: var(--blue);
        opacity: 1;
      }

      60% {
        color: var(--black);
        opacity: 1;
      }

      72% {
        color: var(--black);
        opacity: 1;
      }

      74% {
        color: var(--blue);
        opacity: 1;
      }

      76% {
        color: var(--black);
        opacity: 1;
      }

      82% {
        color: var(--black);
        opacity: 1;
      }

      84% {
        color: var(--blue);
        opacity: 1;
      }

      100% {
        color: var(--blue);
        opacity: 1;
      }
    }

    .about {
      max-width: 560px;
      margin: 8px auto 18px;
      font-family: "Arial Black", Arial, sans-serif;
      font-weight: 900;
      color: var(--blue);
      font-size: 1rem;
      line-height: 1.35;
      text-transform: lowercase;
      letter-spacing: 0.02em;
    }

    .about p {
      margin: 0;
    }

    .image-section {
      margin: 0 auto 16px;
      display: flex;
      justify-content: center;
    }

    .main-image {
      width: min(69vw, 390px);
      height: auto;
      object-fit: contain;
      display: block;
    }

    .contact-button {
      display: inline-block;
      margin: 8px auto 24px;
      padding: 14px 28px;
      border: none;
      border-radius: 999px;
      background-color: var(--blue);
      color: var(--white);
      font-family: Impact, "Arial Black", Arial, sans-serif;
      font-size: 1.15rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background-color 0.25s ease, transform 0.25s ease;
    }

    .contact-button:hover {
      background-color: var(--blue-dark);
      transform: translateY(-2px);
    }

    .contact-section {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transform: translateY(20px);
      transition:
        max-height 0.8s ease,
        opacity 0.5s ease,
        transform 0.6s ease;
    }

    .contact-section.open {
      max-height: 900px;
      opacity: 1;
      transform: translateY(0);
    }

    h2 {
      margin: 12px 0 18px;
      color: var(--blue);
      font-size: 2rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    form {
      display: grid;
      gap: 16px;
      text-align: left;
      font-family: Arial, sans-serif;
    }

    label {
      font-weight: 700;
      color: var(--blue);
    }

    input,
    select,
    textarea {
      width: 100%;
      margin-top: 6px;
      padding: 12px 14px;
      font-family: Arial, sans-serif;
      font-size: 1rem;
      border: 2px solid var(--image-neutral);
      border-radius: 12px;
      background-color: var(--white);
      color: var(--blue);
    }

    input::placeholder,
    textarea::placeholder {
      color: rgba(0, 148, 191, 0.65);
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: 2px solid var(--blue);
      outline-offset: 2px;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    .small-note {
      margin: -6px 0 0;
      font-size: 0.85rem;
      color: var(--blue);
      opacity: 0.8;
    }

    .submit-button {
      padding: 14px 18px;
      border: none;
      border-radius: 999px;
      background-color: var(--blue);
      color: var(--white);
      font-family: Impact, "Arial Black", Arial, sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .submit-button:hover {
      background-color: var(--blue-dark);
    }

    @media (max-width: 480px) {
      .page {
        padding: 18px 14px 32px;
      }

      h1 {
        font-size: clamp(2.6rem, 14vw, 4rem);
      }

      .about {
        font-size: 0.9rem;
        margin: 8px auto 16px;
      }

      .main-image {
        width: min(70vw, 322px);
      }

      .contact-button {
        font-size: 1rem;
        padding: 13px 24px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="container">

      <header>
        <h1>Guided <span class="flicker-de">De</span>tours</h1>
      </header>

      <section class="about">
        <p>
          alternative and niche tours of paris
        </p>
      </section>

      <section class="image-section">
        <img
          class="main-image"
          src="Napoleon_Landing_Page.png"
          alt="Guided Detours Paris tour image"
        />
      </section>

      <button class="contact-button" id="openContactButton" type="button">
        More
      </button>

      <section class="contact-section" id="contactSection">
        <h2>Contact</h2>

        <form action="mailto:info@guideddetours.com" method="post" enctype="text/plain">

          <label>
            Name *
            <input type="text" name="Name" required placeholder="Your name" />
          </label>

          <label>
            Email *
            <input type="email" name="Email" required placeholder="info@guideddetours.com" />
          </label>

          <label>
            Telephone number (optional)
            <input type="tel" name="Telephone" placeholder="+33 6 00 00 00 00" />
          </label>

          <label>
            Type *
            <select name="Type of query" required>
              <option value="">Choose one</option>
              <option value="Request information packet">Request information packet</option>
              <option value="Design-A-Tour">Design-A-Tour</option>
              <option value="Other">Other</option>
            </select>
          </label>

          <label>
            Message *
            <textarea
              name="Message"
              maxlength="500"
              required
            ></textarea>
          </label>

          <p class="small-note">Max 500 characters.</p>

          <button class="submit-button" type="submit">Send</button>
        </form>
      </section>

    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const openContactButton = document.getElementById("openContactButton");
      const contactSection = document.getElementById("contactSection");

      openContactButton.addEventListener("click", function () {
        contactSection.classList.add("open");

        setTimeout(function () {
          contactSection.scrollIntoView({
            behavior: "smooth",
            block: "start"
          });
        }, 250);
      });
    });
  </script>
</body>
</html>
